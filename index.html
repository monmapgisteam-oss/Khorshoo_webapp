<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Хоршоодын судалгаа — Дашбоард</title>

  <link rel="stylesheet" href="https://js.arcgis.com/4.30/esri/themes/light/main.css" />
  <script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script src="https://js.arcgis.com/4.30/"></script>

  <style>
    :root {
      --brand: #1b5e20;
      --brand-dark: #0f3d14;
      --accent: #2e7d32;
      --panel-bg: #ffffff;
      --muted: #6b7280;
      --line: #e5e7eb;
      --track: #eef1ee;
      --kpi-bg: #f3f7f3;

      /* Header (бараан загвар) */
      --hdr-bg: #0b1a2b;
      --hdr-bg2: #0e2236;
      --hdr-teal: #29c5d6;
      --hdr-text: #eaf2f6;
      --hdr-sub: #8aa0ad;
      --hdr-border: #1d3a52;
    }
    * { box-sizing: border-box; }

    /* ===== Нэвтрэх (login) ===== */
    #login-overlay { position: fixed; inset: 0; z-index: 1000; background: var(--hdr-bg); display: flex; align-items: center; justify-content: center; }
    #login-overlay.hidden { display: none; }
    #login-form { background: var(--hdr-bg2); border: 1px solid var(--hdr-teal); border-radius: 10px; padding: 32px 36px; width: 330px; max-width: 90vw; box-shadow: 0 12px 40px rgba(0,0,0,.5); text-align: center; }
    #login-form h2 { color: #f4f8fa; font-size: 18px; letter-spacing: .05em; margin: 0 0 4px; }
    #login-form .sub { color: var(--hdr-sub); font-size: 13px; margin-bottom: 22px; }
    #login-form input { width: 100%; margin-bottom: 12px; padding: 10px 12px; border: 1px solid var(--hdr-border); border-radius: 6px; background: #08131f; color: var(--hdr-text); font-size: 14px; }
    #login-form input:focus { outline: none; border-color: var(--hdr-teal); }
    #login-form button { width: 100%; padding: 11px; background: var(--hdr-teal); color: #05222a; border: none; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; }
    #login-form button:hover { background: #4dd0e1; }
    #login-err { color: #ff6b6b; font-size: 12px; min-height: 15px; margin-bottom: 6px; }

    /* ===== Scrollbar дизайн (бараан-teal) ===== */
    * { scrollbar-width: thin; scrollbar-color: #2f6a82 transparent; }
    ::-webkit-scrollbar { width: 9px; height: 9px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,.04); }
    ::-webkit-scrollbar-thumb { background: #2f6a82; border-radius: 6px; border: 2px solid transparent; background-clip: content-box; }
    ::-webkit-scrollbar-thumb:hover { background: #29c5d6; background-clip: content-box; }
    ::-webkit-scrollbar-corner { background: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; font-family: "Segoe UI", Roboto, "Noto Sans", Arial, sans-serif; color: #111; }
    #app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ===== Header (ArcGIS Dashboards маягийн category selector) ===== */
    header.topbar {
      background: var(--hdr-bg); color: var(--hdr-text); display: flex; align-items: stretch;
      flex: none; height: 64px; z-index: 30; border-bottom: 1px solid var(--hdr-teal);
    }
    header.topbar .title {
      display: flex; align-items: center; padding: 0 28px; flex: 1; min-width: 0;
    }
    header.topbar .title h1 {
      font-size: 22px; font-weight: 600; margin: 0; letter-spacing: .06em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #f4f8fa;
    }
    #report-btn { align-self: center; display: flex; align-items: center; gap: 7px; background: rgba(41,197,214,.15); border: 1px solid var(--hdr-teal); color: var(--hdr-teal); border-radius: 6px; padding: 8px 13px; margin: 0 16px 0 14px; cursor: pointer; font-size: 13px; font-weight: 600; white-space: nowrap; }
    #report-btn:hover { background: rgba(41,197,214,.3); }
    #report-btn svg { width: 17px; height: 17px; stroke: currentColor; fill: none; flex: none; }
    .selectors { display: flex; align-items: stretch; }
    .sel {
      display: flex; align-items: center; gap: 10px; padding: 0 18px; min-width: 190px;
      border-left: 1px solid var(--hdr-border); cursor: pointer; position: relative;
      transition: background .15s;
    }
    .sel:hover { background: var(--hdr-bg2); }
    .sel.open { background: var(--hdr-bg2); box-shadow: inset 0 0 0 1px var(--hdr-teal); }
    .sel .ico { width: 18px; height: 18px; flex: none; stroke: var(--hdr-teal); fill: none; }
    .sel-txt { min-width: 0; }
    .sel-label { font-size: 12px; font-weight: 700; letter-spacing: .05em; color: var(--hdr-text); }
    .sel-sum { font-size: 12px; color: var(--hdr-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
    .sel.has-val .sel-sum { color: var(--hdr-teal); }
    .sel .badge {
      margin-left: auto; background: var(--hdr-teal); color: #05222a; font-size: 11px; font-weight: 700;
      border-radius: 10px; padding: 1px 7px; display: none;
    }
    .sel.has-val .badge { display: inline-block; }

    /* Dropdown */
    #dropdown {
      position: fixed; width: 270px; background: var(--hdr-bg2); border: 1px solid var(--hdr-teal);
      box-shadow: 0 8px 24px rgba(0,0,0,.45); z-index: 40; display: none; flex-direction: column;
      color: var(--hdr-text);
    }
    #dropdown.show { display: flex; }
    .dd-search { padding: 10px; border-bottom: 1px solid var(--hdr-border); display: flex; align-items: center; gap: 8px; }
    .dd-search svg { width: 15px; height: 15px; stroke: var(--hdr-sub); fill: none; flex: none; }
    .dd-search input {
      flex: 1; background: #08131f; border: 1px solid var(--hdr-border); color: var(--hdr-text);
      border-radius: 4px; padding: 6px 8px; font-size: 13px; outline: none;
    }
    .dd-search input:focus { border-color: var(--hdr-teal); }
    .dd-list { max-height: 280px; overflow-y: auto; padding: 6px 0; }
    .dd-item { display: flex; align-items: center; gap: 9px; padding: 6px 12px; font-size: 13px; cursor: pointer; }
    .dd-item:hover { background: rgba(41,197,214,.12); }
    .dd-item input { accent-color: var(--hdr-teal); width: 15px; height: 15px; flex: none; }
    .dd-item .lbl { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dd-item .cnt { color: var(--hdr-sub); font-size: 11px; font-variant-numeric: tabular-nums; }
    .dd-empty { padding: 14px 12px; color: var(--hdr-sub); font-size: 12px; }
    .dd-footer { display: flex; border-top: 1px solid var(--hdr-border); }
    .dd-footer button {
      flex: 1; background: transparent; color: var(--hdr-sub); border: none; padding: 11px; font-size: 13px; cursor: pointer;
    }
    .dd-footer button:hover { color: var(--hdr-text); background: var(--hdr-bg); }
    .dd-footer .primary { color: var(--hdr-teal); border-left: 1px solid var(--hdr-border); font-weight: 600; }

    /* ===== Body ===== */
    .body { flex: 1; display: flex; min-height: 0; }
    .panel { width: 380px; min-width: 380px; background: var(--panel-bg); border-right: 1px solid var(--line); overflow-y: auto; display: flex; flex-direction: column; }
    .panel-right { border-right: none; border-left: 1px solid var(--hdr-border); background: var(--hdr-bg); color: var(--hdr-text); }
    /* Газрын зураг дээрх индикаторууд */
    .map-indicators { display: flex; gap: 10px; padding: 10px 12px; background: var(--hdr-bg); flex: none; margin-bottom: -1px; position: relative; z-index: 2; }
    .mi { flex: 1; background: rgba(11,26,43,.92); border: 1px solid rgba(41,197,214,.5); border-radius: 4px; padding: 7px 12px 9px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 2px 10px rgba(0,0,0,.35); }
    .mi-label { font-size: 12.5px; font-weight: 700; letter-spacing: .06em; color: #8fd0dc; text-transform: uppercase; margin-bottom: 5px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
    .mi-val { display: flex; align-items: center; gap: 9px; font-size: 24px; font-weight: 700; color: #f4f8fa; line-height: 1; }
    .mi-val svg { width: 22px; height: 22px; stroke: #cfe8ef; fill: none; flex: none; }
    @media (max-width: 1100px) { .mi-val { font-size: 19px; } .mi-label { font-size: 10px; } }

    .resizer { width: 4px; flex: none; cursor: col-resize; background: var(--hdr-border); z-index: 6; transition: background .15s; }
    .resizer:hover, .resizer.dragging { background: var(--hdr-teal); }
    #view { flex: 1; position: relative; min-width: 0; display: flex; flex-direction: column; background: var(--hdr-bg); }
    #map { position: relative; flex: 1 1 auto; min-height: 0; background: var(--hdr-bg); }
    /* ArcGIS view focus outline (нимгэн цайвар хүрээ) арилгах */
    .esri-view-surface:focus, .esri-view-surface--inset-outline:focus::after { outline: none !important; }
    .esri-view .esri-view-surface::after { display: none !important; }
    .loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,.7); font-size: 14px; color: var(--brand-dark); z-index: 5; }
    .map-scale { background: rgba(11,26,43,.85); color: #cfe8ef; border: 1px solid var(--hdr-border); border-radius: 4px; padding: 3px 9px; font-size: 12px; font-variant-numeric: tabular-nums; box-shadow: 0 1px 4px rgba(0,0,0,.3); }

    .psearch { padding: 12px 16px; border-bottom: 1px solid var(--line); }
    .psearch input { width: 100%; border: 1px solid var(--line); border-radius: 6px; padding: 8px 10px; font-size: 13px; }

    .kpi-strip { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--line); }
    .kpi { background: var(--kpi-bg); border: 1px solid #e2ece2; border-radius: 10px; padding: 11px 12px; }
    .kpi .v { font-size: 19px; font-weight: 700; color: var(--brand-dark); line-height: 1.1; }
    .kpi .l { font-size: 11px; color: var(--muted); margin-top: 3px; }

    .chart { padding: 12px 16px; border-bottom: 1px solid var(--line); }
    .chart h3 { font-size: 12px; margin: 0 0 10px; color: var(--brand-dark); text-transform: uppercase; letter-spacing: .03em; display: flex; justify-content: space-between; }
    .chart h3 .hint { font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--muted); font-size: 10px; }
    .bar-row { display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 2px 0; border-radius: 4px; }
    .bar-row .bl { width: 110px; min-width: 110px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #cdd9e0; }
    .bar-track { flex: 1; background: rgba(255,255,255,.07); border-radius: 4px; height: 15px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px 0 0 4px; background: var(--hdr-teal); transition: width .35s ease; min-width: 2px; }
    .bar-val { width: 52px; min-width: 52px; text-align: right; font-variant-numeric: tabular-nums; color: var(--hdr-sub); }
    .chart .empty { font-size: 12px; color: var(--hdr-sub); font-style: italic; }
    /* Баруун самбарын histogram (зүүн chart шиг) */
    .hbar-row { display: flex; align-items: center; gap: 8px; height: 23px; }
    .hbar-label { width: 104px; min-width: 104px; text-align: right; font-size: 11px; color: #cdd9e0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hbar-plot { position: relative; flex: 1; height: 15px; margin-right: 46px; }
    .hbar-fill { position: absolute; left: 0; top: 0; height: 100%; background: rgba(41,197,214,.16); border: 1px solid rgba(41,197,214,.6); box-sizing: border-box; border-radius: 3px; min-width: 2px; transition: width .35s ease; }
    .hbar-val { position: absolute; top: 50%; transform: translateY(-50%); padding-left: 6px; font-size: 11px; color: var(--hdr-sub); font-variant-numeric: tabular-nums; white-space: nowrap; }

    .pp-section-title { font-size: 12px; font-weight: 700; color: var(--brand-dark); margin: 12px 0 6px; padding-bottom: 4px; border-bottom: 1px solid var(--line); text-transform: uppercase; letter-spacing: .02em; }
    .pp-row { display: flex; font-size: 13px; padding: 3px 0; }
    .pp-row .k { flex: 1; color: var(--muted); padding-right: 10px; }
    .pp-row .v { flex: 1; text-align: right; font-weight: 600; color: #111; word-break: break-word; }
    .pp-empty { font-size: 12px; color: var(--muted); font-style: italic; }

    /* ===== Баруун самбар: динамик асуумжийн дүн ===== */
    .rp-head { padding: 14px 16px; border-bottom: 1px solid var(--hdr-border); background: var(--hdr-bg2); position: sticky; top: 0; z-index: 1; }
    .rp-head h2 { font-size: 14px; margin: 0; color: #f4f8fa; line-height: 1.3; }
    .rp-head .sub { font-size: 12px; color: var(--hdr-sub); margin-top: 4px; }
    .rp-hint { padding: 40px 22px; color: var(--hdr-sub); font-size: 13px; line-height: 1.6; text-align: center; }
    .rp-hint b { color: var(--hdr-teal); }
    .rp-card { padding: 12px 16px; border-bottom: 1px solid var(--hdr-border); }
    .rp-q { font-size: 13px; color: #cdd9e0; margin-bottom: 9px; font-weight: 600; line-height: 1.4; }
    .rp-empty { font-size: 12px; color: var(--hdr-sub); font-style: italic; }
    .ind { display: flex; align-items: baseline; gap: 7px; }
    .ind .big { font-size: 22px; font-weight: 700; color: var(--hdr-teal); line-height: 1; }
    .ind .unit { font-size: 12px; color: var(--hdr-sub); }
    .ind-sub { font-size: 11px; color: var(--hdr-sub); margin-top: 6px; text-align: right; }
    .donut-wrap { display: flex; align-items: center; gap: 14px; }
    .donut-wrap svg { flex: none; }
    .dleg { font-size: 11px; flex: 1; min-width: 0; }
    .dleg .r { display: flex; align-items: center; gap: 6px; padding: 1.5px 0; }
    .dleg .sw { width: 10px; height: 10px; border-radius: 2px; flex: none; }
    .dleg .nm { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #cdd9e0; }
    .dleg .vv { color: var(--hdr-sub); font-variant-numeric: tabular-nums; }
    /* Санал зөвлөмж — товч ба жагсаалт */
    .rp-sgbtn { background: rgba(41,197,214,.12); border: 1px solid rgba(41,197,214,.5); color: var(--hdr-teal); border-radius: 5px; padding: 7px 12px; font-size: 12px; cursor: pointer; }
    .rp-sgbtn:hover { background: rgba(41,197,214,.22); }
    #sg-panel { position: fixed; width: 420px; max-width: 90vw; max-height: 38vh; background: var(--hdr-bg2); border: 1px solid var(--hdr-teal); border-radius: 6px; box-shadow: 0 10px 40px rgba(0,0,0,.5); z-index: 50; display: none; flex-direction: column; color: var(--hdr-text); }
    #sg-panel.show { display: flex; }
    .sg-head { padding: 12px 16px; border-bottom: 1px solid var(--hdr-border); font-size: 13px; font-weight: 600; color: #f4f8fa; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .sg-count { color: var(--hdr-teal); font-size: 12px; flex: none; }
    .sg-list { overflow-y: auto; padding: 4px 0; }
    .sg-item { padding: 8px 16px; font-size: 13px; color: #dbe7ee; border-bottom: 1px solid rgba(255,255,255,.05); line-height: 1.45; }
    .sg-empty { padding: 18px 16px; color: var(--hdr-sub); font-size: 13px; }
    .sg-rz { position: absolute; z-index: 2; }
    .sg-rz-l { left: -3px; top: 0; bottom: 0; width: 7px; cursor: ew-resize; }
    .sg-rz-t { top: -3px; left: 0; right: 0; height: 7px; cursor: ns-resize; }
    .sg-rz-tl { top: -4px; left: -4px; width: 14px; height: 14px; cursor: nwse-resize; z-index: 3; }
    .sg-rz-l:hover, .sg-rz-t:hover, .sg-rz-tl:hover { background: rgba(41,197,214,.3); }

    /* ===== Зүүн самбар: serial bar chart (бараан) ===== */
    #panel-left { background: var(--hdr-bg); color: var(--hdr-text); overflow: hidden; border-right: none; }
    #left-chart { flex: 1 1 auto; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
    .chart-switcher { display: flex; align-items: center; height: 40px; flex: none; border-top: 1px solid var(--hdr-border); background: var(--hdr-bg2); }
    .cs-arrow { width: 44px; height: 100%; background: none; border: none; color: var(--hdr-sub); font-size: 20px; line-height: 1; cursor: pointer; transition: color .15s, background .15s; }
    .cs-arrow:hover { color: var(--hdr-teal); background: rgba(41,197,214,.10); }
    .cs-arrow:disabled { opacity: .3; cursor: default; }
    .cs-arrow:disabled:hover { color: var(--hdr-sub); background: none; }
    .cs-title { flex: 1; text-align: center; font-size: 13px; font-weight: 600; color: #dbe7ee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 6px; }
    .serial-head { padding: 14px 16px 6px; font-size: 12px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; text-align: center; color: #f4f8fa; position: sticky; top: 0; background: var(--hdr-bg); z-index: 1; }
    .serial-sub { padding: 0 16px 6px; font-size: 11px; color: var(--hdr-sub); }
    .serial { padding: 4px 16px 8px; flex: 1 1 auto; display: flex; flex-direction: column; }
    .s-row { display: flex; align-items: center; gap: 8px; flex: 1 1 auto; min-height: 22px; }
    .s-label { width: 84px; min-width: 84px; text-align: right; font-size: 11px; color: #cdd9e0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .s-plot { position: relative; flex: 1; height: 60%; min-height: 14px; margin-right: 56px; }
    .s-bar { position: absolute; left: 0; top: 0; height: 100%; background: rgba(41,197,214,.10); border: 1px solid #2c6f8a; box-sizing: border-box; cursor: pointer; transition: width .4s ease; }
    .s-row:hover .s-bar { background: rgba(41,197,214,.22); }
    .s-row.active .s-bar { background: rgba(41,197,214,.38); border-color: var(--hdr-teal); }
    .s-val { position: absolute; top: 50%; transform: translateY(-50%); font-size: 11px; color: #9fd9e6; white-space: nowrap; pointer-events: none; }
    .s-axis { display: flex; gap: 8px; margin-top: 8px; padding: 0 16px; }
    .s-axis .sp { width: 84px; min-width: 84px; }
    .s-axis .ax { flex: 1; position: relative; height: 18px; border-top: 1px solid #24435c; margin-right: 56px; }
    .s-axis .t { position: absolute; top: 3px; font-size: 10px; color: #7fa0b2; white-space: nowrap; }
    .serial-empty { padding: 24px 16px; color: var(--hdr-sub); font-size: 13px; }
    .separator { height: 0; border-top: 2px solid rgba(41,197,214,.55); margin: 8px 16px; }

    @media (max-width: 900px) {
      header.topbar { height: auto; flex-direction: column; }
      .selectors { flex-wrap: wrap; }
      .sel { flex: 1 1 50%; border-top: 1px solid var(--hdr-border); min-width: 0; }
      .body { flex-direction: column; }
      .panel { width: 100%; min-width: 0; max-height: 50vh; }
    }
  </style>
</head>
<body>
  <div id="login-overlay">
    <form id="login-form">
      <h2>ХОРШООДЫН СУДАЛГАА</h2>
      <div class="sub">Нэвтрэх</div>
      <input id="login-user" type="text" placeholder="Хэрэглэгчийн нэр" autocomplete="username" />
      <input id="login-pass" type="password" placeholder="Нууц үг" autocomplete="current-password" />
      <div id="login-err"></div>
      <button type="submit">Нэвтрэх</button>
    </form>
  </div>

  <div id="app">
    <header class="topbar">
      <div class="title"><h1>ХОРШООДЫН СУДАЛГАА</h1></div>
      <div class="selectors" id="selectors"></div>
      <button id="report-btn" title="Тайлан татах (Word)">
        <svg viewBox="0 0 24 24" stroke-width="2"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M5 21h14"/></svg>
        <span>Тайлан</span>
      </button>
    </header>

    <div class="body">
      <aside class="panel" id="panel-left">
        <div id="left-chart"></div>
        <div class="chart-switcher" id="chart-switcher">
          <button class="cs-arrow" id="cs-prev" title="Өмнөх график">‹</button>
          <div class="cs-title" id="cs-title"></div>
          <button class="cs-arrow" id="cs-next" title="Дараах график">›</button>
        </div>
      </aside>
      <div class="resizer" id="resizer-left" title="Чирж өргөсгөх / нарийсгах"></div>

      <div id="view">
        <div class="map-indicators" id="map-indicators">
          <div class="mi">
            <div class="mi-label">Зээлийн тоо</div>
            <div class="mi-val"><svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M14 3v6h6"/><path d="M8 13h8M8 17h6"/></svg><span id="ind-count">—</span></div>
          </div>
          <div class="mi">
            <div class="mi-label">Олгосон зээл</div>
            <div class="mi-val"><svg viewBox="0 0 24 24" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v10"/><path d="M14.5 9.2a2.6 2 0 0 0-5 .3c0 2.5 5 1.3 5 3.8a2.6 2 0 0 1-5 .3"/></svg><span id="ind-loan">—</span></div>
          </div>

        paths += `<path d="M${o0[0]} ${o0[1]} A${rO} ${rO} 0 ${large} 1 ${o1[0]} ${o1[1]} L${i1[0]} ${i1[1]} A${rI} ${rI} 0 ${large} 0 ${i0[0]} ${i0[1]} Z" fill="${hexA(s.color, .3)}" stroke="${s.color}" stroke-width="0.8"/>`;
        a0 = a1;
      });
      return `<svg width="84" height="84" viewBox="0 0 84 84">${paths}<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#eaf2f6">${fmtCount(total)}</text></svg>`;
    }
    function donutHtml(segs, total) {
      return `<div class="donut-wrap">${donutSvg(segs, total)}<div class="dleg">${segs.map(s =>
        `<div class="r"><span class="sw" style="background:${s.color}"></span><span class="nm" title="${s.name}">${s.name}</span><span class="vv">${fmtCount(s.value)}</span></div>`).join("")}</div></div>`;
    }
    // Тоон хариултын тархалтын график (95 хувиар таслаж, илүүг "+"-д хийнэ)
    function histogramHtml(vals, isMoney) {
      const fmt = isMoney ? fmtMoney : fmtCompact;
      const sorted = [...vals].sort((a, b) => a.n - b.n);
      const totalW = sorted.reduce((a, v) => a + v.w, 0);
      const q = p => { let acc = 0, t = p * totalW; for (const v of sorted) { acc += v.w; if (acc >= t) return v.n; } return sorted[sorted.length - 1].n; };
      const min = sorted[0].n, hi = q(0.95), BINS = 6;
      if (hi <= min) return null;
      const step = (hi - min) / BINS;
      const bins = Array.from({ length: BINS }, () => 0); let overflow = 0;
      vals.forEach(v => { if (v.n > hi) { overflow += v.w; return; } let idx = Math.floor((v.n - min) / step); if (idx >= BINS) idx = BINS - 1; if (idx < 0) idx = 0; bins[idx] += v.w; });
      const cells = [];
      for (let i = 0; i < BINS; i++) cells.push({ lbl: fmtRange(min + step * i, min + step * (i + 1), isMoney), w: bins[i] });
      if (overflow > 0) cells.push({ lbl: fmt(hi) + "+", w: overflow });
      const maxW = Math.max.apply(null, cells.map(c => c.w)) || 1;
      return cells.map(c => {
        const pct = Math.max(2, c.w / maxW * 100);
        return `<div class="hbar-row"><div class="hbar-label" title="${c.lbl}">${c.lbl}</div>` +
          `<div class="hbar-plot"><div class="hbar-fill" style="width:${pct.toFixed(1)}%"></div>` +
          `<div class="hbar-val" style="left:${pct.toFixed(1)}%">${fmtCount(c.w)}</div></div></div>`;
      }).join("");
    }

    // ===== Шүүлтийн төлөв =====
    let surveyLayer = null, OID = "OBJECTID", regionLayer = null;
    const DIMS = {
      bus:   { field: "name",          label: "БҮС" },
      aimag: { field: "Аймаг",         label: "АЙМАГ" },
      sum:   { field: "Зөв_сумын_нэр", label: "СУМ" },

    };
    const sel = { bus: new Set(), aimag: new Set(), sum: new Set(), uach: new Set() };
    let searchText = "";

    function inClause(field, set) {
      if (!set.size) return null;
      return field + " IN (" + [...set].map(v => "'" + esc(v) + "'").join(",") + ")";
    }
    function whereParts(skipKey) {
      const parts = [];
      for (const key in DIMS) {
        if (key === skipKey) continue;
        const c = inClause(DIMS[key].field, sel[key]);
        if (c) parts.push(c);
      }
      if (searchText) {
        const s = esc(searchText);
        parts.push("(Хоршооны_нэр LIKE '%" + s + "%' OR Зээл_хүсэгчийн_овог_нэр LIKE '%" + s + "%' OR Нэр LIKE '%" + s + "%' OR Овог LIKE '%" + s + "%')");
      }
      return parts.length ? parts.join(" AND ") : "1=1";
    }

    async function distinctWithCounts(field, skipKey) {
      const res = await surveyLayer.queryFeatures({
        where: whereParts(skipKey), returnGeometry: false,
        groupByFieldsForStatistics: [field],
        outStatistics: [{ statisticType: "count", onStatisticField: OID, outStatisticFieldName: "c" }],
        orderByFields: (field === "ҮАЧ") ? [field + " ASC"] : ["c DESC"], num: 1000
      });
      let opts = res.features.map(f => ({ value: f.attributes[field], count: f.attributes.c })).filter(o => !isEmpty(o.value));
      if (field === "ҮАЧ") {
        const numOf = v => { const m = String(v).match(/(\d+)/); return m ? +m[1] : 999; };
        opts.sort((a, b) => numOf(a.value) - numOf(b.value));
      }
      return opts;
    }

    async function statTotals() {
      const res = await surveyLayer.queryFeatures({ where: whereParts(), returnGeometry: false, outStatistics: [
        { statisticType: "count", onStatisticField: OID, outStatisticFieldName: "cnt" },
        { statisticType: "sum", onStatisticField: "Олгосон_зээлийн_дүн", outStatisticFieldName: "loan" },
        { statisticType: "avg", onStatisticField: "Олгосон_зээлийн_дүн", outStatisticFieldName: "avg" },
        { statisticType: "sum", onStatisticField: "Зээлийн_үлдэгдэл", outStatisticFieldName: "bal" } ]});
      return res.features[0].attributes;

    async function statBy(field, skipKey, top) {
      const res = await surveyLayer.queryFeatures({ where: whereParts(skipKey), returnGeometry: false,
        groupByFieldsForStatistics: [field],
        outStatistics: [{ statisticType: "count", onStatisticField: OID, outStatisticFieldName: "cnt" }],
        orderByFields: ["cnt DESC"], num: top || 1000 });

    // ===== Бүгдийг шинэчлэх =====
    let refreshSeq = 0;
    async function refreshAll() {
      if (!surveyLayer) return;
      const seq = ++refreshSeq;
      const where = whereParts();
      surveyLayer.definitionExpression = (where === "1=1") ? "" : where;
      // Бүсийн полигон давхаргыг БҮС сонголтоор шүүнэ
      if (regionLayer) regionLayer.definitionExpression = inClause("name", sel.bus) || "";

      // Дашбоард зарчмаар: шүүсэн цэгүүдийн хэсэг рүү zoom in
      (async () => {
        try {
          if (where === "1=1") {
            view.goTo({ center: [103.5, 46.8], scale: 12000000 }, { duration: 600 }).catch(() => {});
            return;
          }
          const r = await surveyLayer.queryExtent({ where });
          if (seq !== refreshSeq) return;
          if (!r || !r.count || !r.extent) return;
          // Хамгийн нарийвчилсан газарзүйн шүүлтээр тогтсон масштаб
          let targetScale = null;
          if (sel.sum.size) targetScale = 700000;

    async function updateIndicators(seq) {
      const base = whereParts();

          surveyLayer.queryFeatureCount({ where: aw("Олгосон_зээлийн_дүн <> 0") }),

          surveyLayer.queryFeatureCount({ where: aw("ҮАЧ IS NOT NULL") })
        ]);

        document.getElementById("ind-count").textContent = fmtCount(cLoan);
        document.getElementById("ind-loan").textContent = fmtB(totals.features[0].attributes.loan || 0);

    // ----- Зүүн самбар: аймгаар олгосон зээлийн нийлбэр (serial bar chart) -----
    function niceCeil(x) { if (x <= 0) return 1; const mag = Math.pow(10, Math.floor(Math.log10(x))); for (const k of [1, 2, 2.5, 5, 10]) { if (k * mag >= x) return k * mag; } return 10 * mag; }
    function fmtB(v) { const b = v / 1e9; if (Math.abs(b) >= 1) return b.toFixed(1).replace(/\.0$/, "") + "тэрбум"; const m = v / 1e6; if (Math.abs(m) >= 1) return Math.round(m) + "сая"; return Math.round(v).toLocaleString("en-US"); }
    // Том тоог компакт болгох (сая/мянга), жижгийг бүтнээр
    function fmtCompact(x) {
      const a = Math.abs(x);
      if (a >= 1e9) return (Math.round(x / 1e8) / 10).toString().replace(/\.0$/, "") + "тэрбум";
      if (a >= 1e6) return (Math.round(x / 1e5) / 10).toString().replace(/\.0$/, "") + "сая";
      if (a >= 1e4) return (Math.round(x / 100) / 10).toString().replace(/\.0$/, "") + "мянга";
      return fmtCount(Math.round(x));
    }
    // Бин хүрээний компакт шошго (мөнгөн дүн нэгжээ хуваалцана)
    function fmtRange(lo, hi, isMoney) {
      if (!isMoney) return fmtCompact(lo) + " - " + fmtCompact(hi);
      const a = Math.abs(hi);
      const unit = a >= 1e9 ? [1e9, "тэрбум"] : a >= 1e6 ? [1e6, "сая"] : a >= 1e3 ? [1e3, "мянга"] : [1, ""];
      const f = x => { const v = x / unit[0]; return (Math.round(v * 10) / 10).toString(); };
      return f(lo) + " - " + f(hi) + " " + unit[1] + "₮";
    }

    // Зүүн самбарт сэлгэгдэх графикуудын жагсаалт (дараа нь нэмнэ)
    const CHARTS = [
      { id: "loan-aimag", title: "Олгосон зээлийн дүн", render: s => renderSerial(s, { field: "Аймаг", skipDim: "aimag", clickDim: "aimag", labelWidth: 84, title: "Олгосон зээлийн дүн" }) },
      { id: "loan-purpose", title: "Зээл олгосон дүн, зориулалтаар", render: s => renderSerial(s, { field: "Зээлийн_зориулалт", extraWhere: "Зээлийн_зориулалт <> '-'", labelWidth: "46%", title: "Зээл олгосон дүн, зориулалтаар" }) }

    const escAttr = v => String(v).replace(/"/g, "&quot;");
    async function renderSerial(s, opt) {
      const pl = document.getElementById("left-chart");
      const lw = opt.labelWidth || 84;
      const lwStyle = (typeof lw === "number") ? `width:${lw}px;min-width:${lw}px` : `flex:0 0 ${lw};width:${lw};min-width:0`;
      let rows;
      try {
        let where = whereParts(opt.skipDim);
        if (opt.extraWhere) where = (where === "1=1") ? opt.extraWhere : where + " AND " + opt.extraWhere;
        const res = await surveyLayer.queryFeatures({
          where: where, returnGeometry: false,
          groupByFieldsForStatistics: [opt.field],
          outStatistics: [{ statisticType: "sum", onStatisticField: "Олгосон_зээлийн_дүн", outStatisticFieldName: "s" }],
          orderByFields: ["s DESC"], num: 200
        });

          `<div class="s-plot"><div class="s-bar" style="width:${pct.toFixed(2)}%;${barCursor}"></div>` +
          `<div class="s-val" style="left:${pct.toFixed(2)}%; padding-left:6px;">${fmtB(r.value)}</div></div></div>`;
      });
      html += `</div>`;
      html += `<div class="s-axis"><div class="sp" style="${lwStyle}"></div><div class="ax">` +
        `<div class="t" style="left:0">0</div>` +
        `<div class="t" style="left:50%;transform:translateX(-50%)">${fmtB(axisMax / 2)}</div>` +
        `<div class="t" style="right:0">${fmtB(axisMax)}</div>` +
        `</div></div>`;
      pl.innerHTML = html;

      if (opt.clickDim) {

    // ----- Баруун самбар: сонгосон ҮАЧ-ийн асуумжийн дүн -----
    async function renderRightPanel(seq) {
      const pr = document.getElementById("panel-right");
      const gids = [...sel.uach].map(v => { const m = String(v).match(/(\d+)/); return m ? +m[1] : null; }).filter(Boolean);
      const gid = gids.length ? Math.min.apply(null, gids) : 1; // сонгоогүй бол анхдагчаар ҮАЧ-1
      const fields = SPECIFIC[gid] || [];
      const base = whereParts("uach"); // бусад шүүлт (ҮАЧ-аас бусад)
      const groupWhere = (base === "1=1") ? "ҮАЧ = 'ҮАЧ-" + gid + "'" : base + " AND ҮАЧ = 'ҮАЧ-" + gid + "'";
      const total = await surveyLayer.queryFeatureCount({ where: groupWhere });
      if (seq !== refreshSeq) return;

      let html = `<div class="rp-head"><h2>ҮАЧ-${gid}. ${groupFull[gid] || groupName[gid]}</h2><div class="sub">${fmtCount(total)} өрхийн асуумж</div></div>`;
      fields.forEach(([f, label], i) => { html += `<div class="rp-card" id="rpc-${i}"><div class="rp-q">${prettyQ(label)}</div><div class="rp-body"><span class="rp-empty">…</span></div></div>`; });
      pr.innerHTML = html;

      fields.forEach(async ([f, label], i) => {
        try {
          const res = await surveyLayer.queryFeatures({ where: groupWhere, returnGeometry: false, groupByFieldsForStatistics: [f], outStatistics: [{ statisticType: "count", onStatisticField: OID, outStatisticFieldName: "cnt" }], orderByFields: ["cnt DESC"], num: 1000 });
          if (seq !== refreshSeq) return;
          const rows = res.features.map(ff => ({ key: ff.attributes[f], value: ff.attributes.cnt }));
          const card = document.getElementById("rpc-" + i); if (!card) return;
          const bodyEl = card.querySelector(".rp-body");
          const clean = rows.filter(r => !isEmpty(r.key));
          const responded = clean.reduce((a, r) => a + r.value, 0);
          if (!responded) { bodyEl.innerHTML = `<div class="rp-empty">Хариулт алга</div>`; return; }

          if (FREETEXT.test(label)) {
            if (/санал зөвлөмж/i.test(label)) {
              bodyEl.innerHTML = `<button class="rp-sgbtn">${fmtCount(responded)} санал — жагсаалт харах</button>`;
              bodyEl.querySelector("button").onclick = (ev) => { ev.stopPropagation(); openSuggestions(f, label, groupWhere); };
            } else {
              bodyEl.innerHTML = indicatorHtml(fmtCount(responded), "хариулт", "бичгээр ирүүлсэн");
            }
            return;
          }
          const numFrac = clean.filter(r => !isNaN(parseNum(cleanLabel(r.key)))).reduce((a, r) => a + r.value, 0) / responded;
          const numeric = isNumericField(f) || NUMHINT.test(label) || (numFrac >= 0.8 && clean.length >= 5);
          if (numeric) {
            const vals = [];
            clean.forEach(r => { const n = parseNum(cleanLabel(r.key)); if (!isNaN(n)) vals.push({ n: n, w: r.value }); });
            const sum = vals.reduce((a, v) => a + v.n * v.w, 0);
            const wsum = vals.reduce((a, v) => a + v.w, 0);
            const isMoney = /₮|дүн|орлого|зардал|ашиг/.test(label);
            const fmt = isMoney ? fmtMoney : (x => fmtCount(Math.round(x)));
            const subline = `<div class="ind-sub">${fmtCount(responded)} хариулсан</div>`;
            const hist = (new Set(vals.map(v => v.n)).size >= 2) ? histogramHtml(vals, isMoney) : null;
            bodyEl.innerHTML = hist ? (hist + subline) : indicatorHtml(fmt(sum), "нийт", `${fmtCount(responded)} хариулсан`);
          } else {
            const agg = {};
            clean.forEach(r => { const k = cleanLabel(r.key); agg[k] = (agg[k] || 0) + r.value; });
            let segs = Object.keys(agg).map(k => ({ name: k, value: agg[k] })).sort((a, b) => b.value - a.value);
            if (segs.length > 6) { const top = segs.slice(0, 6); const rest = segs.slice(6).reduce((a, s) => a + s.value, 0); top.push({ name: "Бусад", value: rest }); segs = top; }
            segs.forEach((s, j) => s.color = PALETTE[j % PALETTE.length]);
            bodyEl.innerHTML = donutHtml(segs, segs.reduce((a, s) => a + s.value, 0));
          }
        } catch (e) {}
      });
    }

    // ----- Санал зөвлөмжийн жагсаалт -----
    let sgOpen = false, sgSeq = 0;
    async function openSuggestions(field, label, where) {
      const panel = document.getElementById("sg-panel");
      const headEl = document.getElementById("sg-head");
      const listEl = document.getElementById("sg-list");
      headEl.innerHTML = `<span>${label}</span>`;
      listEl.innerHTML = `<div class="sg-empty">Ачааллаж байна…</div>`;
      // Газрын зургийн баруун доод буланд тулгаж байрлуулна
      const v = document.getElementById("view").getBoundingClientRect();
      panel.style.right = Math.max(0, window.innerWidth - v.right) + "px";
      panel.style.bottom = Math.max(0, window.innerHeight - v.bottom) + "px";
      panel.classList.add("show");
      sgOpen = true;
      const seq = ++sgSeq;
      try {
        const res = await surveyLayer.queryFeatures({
          where: where + " AND " + field + " IS NOT NULL", outFields: [field],
          returnGeometry: false, orderByFields: [OID + " DESC"], num: 1000
        });
        if (seq !== sgSeq) return;
        const items = res.features.map(ft => ft.attributes[field]).filter(v => !isEmpty(v));
        headEl.innerHTML = `<span>${label}</span><span class="sg-count">${fmtCount(items.length)}</span>`;
        listEl.innerHTML = items.length
          ? items.map(t => `<div class="sg-item">${String(t).replace(/</g, "&lt;")}</div>`).join("")
          : `<div class="sg-empty">Санал алга</div>`;
      } catch (e) { if (seq === sgSeq) listEl.innerHTML = `<div class="sg-empty">Алдаа гарлаа</div>`; }
    }
    function closeSg() { document.getElementById("sg-panel").classList.remove("show"); sgOpen = false; }
    document.getElementById("sg-panel").addEventListener("click", e => e.stopPropagation());
    document.addEventListener("click", () => { if (sgOpen) closeSg(); });

    // Санал зөвлөмжийн panel-ийг зүүн/дээш чирж томруулах
    (function () {
      const panel = document.getElementById("sg-panel");
      let mode = null, sx = 0, sy = 0, sw = 0, sh = 0;
      const start = m => e => { mode = m; sx = e.clientX; sy = e.clientY; const r = panel.getBoundingClientRect(); sw = r.width; sh = r.height; panel.style.height = sh + "px"; panel.style.maxHeight = "none"; document.body.style.userSelect = "none"; e.preventDefault(); e.stopPropagation(); };
      panel.querySelector(".sg-rz-l").addEventListener("mousedown", start("l"));
      panel.querySelector(".sg-rz-t").addEventListener("mousedown", start("t"));
      panel.querySelector(".sg-rz-tl").addEventListener("mousedown", start("tl"));
      window.addEventListener("mousemove", e => {
        if (!mode) return;
        if (mode === "l" || mode === "tl") { let w = sw + (sx - e.clientX); w = Math.max(280, Math.min(window.innerWidth - 30, w)); panel.style.width = w + "px"; }
        if (mode === "t" || mode === "tl") { let h = sh + (sy - e.clientY); h = Math.max(160, Math.min(window.innerHeight - 90, h)); panel.style.height = h + "px"; }
      });
      window.addEventListener("mouseup", () => { if (mode) { mode = null; document.body.style.userSelect = ""; } });
    })();

    function toggleSel(key, value) {
      if (sel[key].has(value)) sel[key].delete(value); else sel[key].add(value);
      updateSummary(key); refreshAll();
    }

    // ===== Header selectors + dropdown =====
    const ICON = `<svg class="ico" viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`;
    function buildSelectors() {
      const wrap = document.getElementById("selectors");
      Object.keys(DIMS).forEach(key => {
        const d = document.createElement("div");
        d.className = "sel"; d.dataset.key = key;
        d.innerHTML = ICON + `<div class="sel-txt"><div class="sel-label">${DIMS[key].label}</div><div class="sel-sum">Энд дарж ...</div></div><span class="badge"></span>`;
        d.onclick = (e) => { e.stopPropagation(); openDropdown(key, d); };
        wrap.appendChild(d);
      });
    }

    const dd = document.getElementById("dropdown");
    const ddList = document.getElementById("dd-list");
    const ddSearch = document.getElementById("dd-search");
    let ddKey = null, ddOptions = [];

    function positionDropdown(anchor) {
      const r = anchor.getBoundingClientRect();
      const W = 270;
      let left = r.left + r.width / 2 - W / 2; // товчны төвд голлуулна
      if (left + W > window.innerWidth) left = window.innerWidth - W - 4;
      dd.style.left = Math.max(4, left) + "px";
      dd.style.top = r.bottom + "px";
    }
    function renderDdList() {
      const q = ddSearch.value.trim().toLowerCase();
      const items = ddOptions.filter(o => !q || String(o.value).toLowerCase().indexOf(q) !== -1);
      if (!items.length) { ddList.innerHTML = `<div class="dd-empty">Илэрц алга</div>`; return; }
      ddList.innerHTML = "";
      items.forEach(o => {
        const it = document.createElement("label"); it.className = "dd-item";
        const checked = sel[ddKey].has(o.value) ? "checked" : "";
        const lbl = o.value;
        it.innerHTML = `<input type="checkbox" ${checked}><span class="lbl" title="${lbl}">${lbl}</span><span class="cnt">${fmtCount(o.count)}</span>`;
        it.querySelector("input").onchange = (ev) => { ev.stopPropagation();
          if (ddKey === "uach") {
            // зөвхөн 1 сонголт, сонгомогц хаана
            sel.uach.clear();
            if (ev.target.checked) sel.uach.add(o.value);
            updateSummary("uach"); refreshAll(); closeDropdown();
            return;
          }
          if (ev.target.checked) sel[ddKey].add(o.value); else sel[ddKey].delete(o.value);
          updateSummary(ddKey); refreshAll();
        };
        ddList.appendChild(it);
      });
    }
    async function openDropdown(key, anchor) {
      if (ddKey === key && dd.classList.contains("show")) { closeDropdown(); return; }
      closeDropdown();
      ddKey = key;
      document.getElementById("dd-all").style.display = (key === "uach") ? "none" : "";
      anchor.classList.add("open");
      positionDropdown(anchor);
      ddSearch.value = "";
      ddList.innerHTML = `<div class="dd-empty">Ачааллаж байна…</div>`;
      dd.classList.add("show");
      try { ddOptions = await distinctWithCounts(DIMS[key].field, key); } catch (e) { ddOptions = []; }
      if (ddKey === key) renderDdList();
    }
    function closeDropdown() {
      dd.classList.remove("show");
      document.querySelectorAll(".sel.open").forEach(s => s.classList.remove("open"));
      ddKey = null;
    }
    ddSearch.addEventListener("input", renderDdList);
    document.getElementById("dd-reset").onclick = (e) => { e.stopPropagation(); if (!ddKey) return; sel[ddKey].clear(); updateSummary(ddKey); renderDdList(); refreshAll(); };
    document.getElementById("dd-all").onclick = (e) => { e.stopPropagation(); if (!ddKey) return;
      const q = ddSearch.value.trim().toLowerCase();
      ddOptions.filter(o => !q || String(o.value).toLowerCase().indexOf(q) !== -1).forEach(o => sel[ddKey].add(o.value));
      updateSummary(ddKey); renderDdList(); refreshAll(); };
    dd.addEventListener("click", e => e.stopPropagation());
    document.addEventListener("click", closeDropdown);
    window.addEventListener("resize", closeDropdown);

    // ----- Зүүн самбарыг чирж өргөсгөх -----
    (function () {
      const resizer = document.getElementById("resizer-left");
      const leftPanel = document.getElementById("panel-left");
      let dragging = false;
      resizer.addEventListener("mousedown", e => { dragging = true; resizer.classList.add("dragging"); document.body.style.userSelect = "none"; e.preventDefault(); });
      window.addEventListener("mousemove", e => {
        if (!dragging) return;
        let w = Math.max(200, Math.min(window.innerWidth - 280, e.clientX));
        leftPanel.style.width = w + "px"; leftPanel.style.minWidth = w + "px";
      });
      window.addEventListener("mouseup", () => { if (dragging) { dragging = false; resizer.classList.remove("dragging"); document.body.style.userSelect = ""; } });
    })();

    // ----- Баруун самбарыг чирж өргөсгөх -----
    (function () {
      const resizer = document.getElementById("resizer-right");
      const rightPanel = document.getElementById("panel-right");
      let dragging = false;
      resizer.addEventListener("mousedown", e => { dragging = true; resizer.classList.add("dragging"); document.body.style.userSelect = "none"; e.preventDefault(); });
      window.addEventListener("mousemove", e => {
        if (!dragging) return;
        let w = Math.max(200, Math.min(window.innerWidth - 280, window.innerWidth - e.clientX));
        rightPanel.style.width = w + "px"; rightPanel.style.minWidth = w + "px";
      });
      window.addEventListener("mouseup", () => { if (dragging) { dragging = false; resizer.classList.remove("dragging"); document.body.style.userSelect = ""; } });
    })();

    // График сэлгэгч (◄ ►)
    document.getElementById("cs-prev").onclick = () => { chartIdx = (chartIdx - 1 + CHARTS.length) % CHARTS.length; renderLeftPanel().catch(() => {}); };
    document.getElementById("cs-next").onclick = () => { chartIdx = (chartIdx + 1) % CHARTS.length; renderLeftPanel().catch(() => {}); };

    // ===== Эхлэл =====
    buildSelectors();
    view.when(async () => {
      await webmap.when();
      webmap.layers.forEach(l => {
        if (l.url && l.url.indexOf(SURVEY_LAYER_MATCH) !== -1) surveyLayer = l;
        if (l.url && l.url.indexOf("6bvs") !== -1) regionLayer = l;
      });
      if (!surveyLayer) surveyLayer = webmap.layers.find(l => /khorshoo|asuumj/i.test(l.title || "")) || webmap.layers.getItemAt(0);
      document.getElementById("loading").style.display = "none";
      try { view.constraints.snapToZoom = false; view.scale = 12000000; } catch (e) {}
      updateScale();
      if (!surveyLayer) return;
      await surveyLayer.load();
      OID = surveyLayer.objectIdField || "OBJECTID";
      (surveyLayer.fields || []).forEach(fl => { fieldType[fl.name] = fl.type; });
      surveyLayer.outFields = ["*"];
      surveyLayer.popupTemplate = { title: "{Хоршооны_нэр}", outFields: ["*"], content: popupContent };
      window.__surveyLayer = surveyLayer; // Excel export-д ашиглана
      refreshAll();
    });

  });
  </script>

  <script>
    // Тайлан icon — docx + FileSaver-ээр жинхэнэ .docx татна (үндсэн кодоос тусдаа)
    (function () {
      var b = document.getElementById("report-btn");
      if (!b) return;
      var txt = function (id) { var el = document.getElementById(id); return el ? el.innerText.trim() : ""; };

      var tEl = function (el) { return el ? el.innerText.trim() : ""; };

      b.addEventListener("click", async function () {
        if (typeof docx === "undefined" || typeof saveAs === "undefined") { alert("docx сан ачаалагдаагүй байна."); return; }
        b.disabled = true;
        try {
          var d = docx;
          var B = { style: d.BorderStyle.SINGLE, size: 1, color: "AAAAAA" };
          var BORD = { top: B, bottom: B, left: B, right: B };
          function cell(text, o) {
            o = o || {};
            return new d.TableCell({
              borders: BORD, margins: { top: 30, bottom: 30, left: 90, right: 90 },
              shading: o.fill ? { type: d.ShadingType.CLEAR, color: "auto", fill: o.fill } : undefined,
              width: o.w ? { size: o.w, type: d.WidthType.PERCENTAGE } : undefined,
              children: [new d.Paragraph({ children: [new d.TextRun({ text: String(text == null ? "" : text), bold: !!o.bold, color: o.color || "000000", size: 18 })] })]
            });
          }
          function hrow(arr) { return new d.TableRow({ tableHeader: true, children: arr.map(function (t) { return cell(t, { bold: true, fill: "0B1A2B", color: "FFFFFF" }); }) }); }
          function drow(arr) { return new d.TableRow({ children: arr.map(function (t) { return cell(t); }) }); }
          function tbl(rows) { return new d.Table({ width: { size: 100, type: d.WidthType.PERCENTAGE }, rows: rows }); }
          function heading(t) { return new d.Paragraph({ spacing: { before: 220, after: 90 }, children: [new d.TextRun({ text: t, bold: true, size: 26, color: "0F3D14" })] }); }
          function para(t, o) { o = o || {}; return new d.Paragraph({ spacing: o.sp ? { before: 120 } : undefined, children: [new d.TextRun({ text: String(t == null ? "" : t), bold: !!o.bold, size: o.size || 20 })] }); }
          var gap = function () { return new d.Paragraph(""); };

          // --- DOM-оос өгөгдөл цуглуулах ---
          var fils = [].slice.call(document.querySelectorAll(".sel")).filter(function (s) { return s.classList.contains("has-val"); })
            .map(function (s) { return tEl(s.querySelector(".sel-label")) + ": " + tEl(s.querySelector(".sel-sum")); });
          var filText = fils.length ? fils.join("; ") : "Бүх өгөгдөл (шүүлтгүй)";
          var layer = window.__surveyLayer;
          function fmtMoney(n) { n = Number(n) || 0; var a = Math.abs(n); if (a >= 1e9) return (n / 1e9).toFixed(1).replace(/\.0$/, "") + " тэрбум₮"; if (a >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, "") + " сая₮"; return Math.round(n).toLocaleString("en-US") + "₮"; }
          async function sumBy(field, extra) {
            var w = (layer && layer.definitionExpression && layer.definitionExpression.trim()) ? layer.definitionExpression : "1=1";
            if (extra) w = (w === "1=1") ? extra : w + " AND " + extra;
            var res = await layer.queryFeatures({ where: w, returnGeometry: false, groupByFieldsForStatistics: [field], outStatistics: [{ statisticType: "sum", onStatisticField: "Олгосон_зээлийн_дүн", outStatisticFieldName: "s" }], orderByFields: ["s DESC"], num: 300 });
            return res.features.map(function (f) { return [f.attributes[field], f.attributes.s]; }).filter(function (r) { return r[0] != null && r[1] > 0; });
          }
          var rpHead = tEl(document.querySelector("#panel-right .rp-head h2"));
          var rpSub = tEl(document.querySelector("#panel-right .rp-head .sub"));
          var cards = [].slice.call(document.querySelectorAll("#panel-right .rp-card")).map(function (c) {
            return {
              q: tEl(c.querySelector(".rp-q")),
              sub: tEl(c.querySelector(".ind-sub")),
              hbars: [].slice.call(c.querySelectorAll(".hbar-row")).map(function (r) { return [tEl(r.querySelector(".hbar-label")), tEl(r.querySelector(".hbar-val"))]; }),
              donut: [].slice.call(c.querySelectorAll(".dleg .r")).map(function (r) { return [tEl(r.querySelector(".nm")), tEl(r.querySelector(".vv"))]; }),
              ind: c.querySelector(".ind") ? (tEl(c.querySelector(".ind .big")) + " " + tEl(c.querySelector(".ind .unit"))).trim() : null,
              sg: c.querySelector(".rp-sgbtn") ? tEl(c.querySelector(".rp-sgbtn")) : null
            };
          });

          var kids = [];
          kids.push(new d.Paragraph({ alignment: d.AlignmentType.CENTER, spacing: { after: 60 }, children: [new d.TextRun({ text: "ШИНЭ ХОРШОО ХӨДӨЛГӨӨН СУДАЛГААНЫ ТАЙЛАН", bold: true, size: 28, color: "0F3D14" })] }));
          kids.push(new d.Paragraph({ alignment: d.AlignmentType.CENTER, children: [new d.TextRun({ text: "Огноо: " + new Date().toLocaleString("mn-MN"), size: 18, color: "666666" })] }));
          if (fils.length) kids.push(para("Шүүлтийн нөхцөл: " + fils.join("; "), { sp: true }));
          kids.push(gap());

          kids.push(heading("1. Үндсэн үзүүлэлт"));
          kids.push(para("Сонгогдсон нөхцөлд нийт " + tEl(document.getElementById("ind-count")) + " зээлдэгч хамрагдсан бөгөөд олгосон нийт зээл " + tEl(document.getElementById("ind-loan")) + ", судалгаанд " + tEl(document.getElementById("ind-survey")) + " өрх хамрагдсан байна."));
          kids.push(tbl([
            hrow(["Үзүүлэлт", "Утга"]),
            drow(["Зээлийн тоо", tEl(document.getElementById("ind-count"))]),
            drow(["Олгосон зээл", tEl(document.getElementById("ind-loan"))]),
            drow(["Судалгаанд хамрагдсан", tEl(document.getElementById("ind-survey"))])
          ]));
          kids.push(gap());

          var aimagRows = layer ? await sumBy("Аймаг", null) : [];
          var purposeRows = layer ? await sumBy("Зээлийн_зориулалт", "Зээлийн_зориулалт <> '-'") : [];
          kids.push(heading("2. Олгосон зээлийн дүн"));
          kids.push(para("Доорх хүснэгтэд аймаг тус бүрд олгосон зээлийн нийт дүнг буурах эрэмбээр харуулав."));
          kids.push(tbl([hrow(["Аймаг", "Дүн"])].concat(aimagRows.map(function (r) { return drow([r[0], fmtMoney(r[1])]); }))));
          kids.push(gap());
          kids.push(heading("3. Зээл олгосон дүн, зориулалтаар"));
          kids.push(para("Доорх хүснэгтэд зээлийн зориулалт тус бүрд олгосон нийт дүнг буурах эрэмбээр харуулав."));
          kids.push(tbl([hrow(["Зориулалт", "Дүн"])].concat(purposeRows.map(function (r) { return drow([r[0], fmtMoney(r[1])]); }))));
          kids.push(gap());

          kids.push(heading("4. " + (rpHead || "Асуумжийн дүн") + (rpSub ? " (" + rpSub + ")" : "")));
          var qcards = cards.filter(function (c) { return c.hbars.length || c.donut.length || c.ind; });
          qcards.forEach(function (c, i) {
            kids.push(para("4." + (i + 1) + ". " + c.q, { bold: true, sp: true }));
            if (c.hbars.length) {
              kids.push(para("Доорх хүснэгтэд уг үзүүлэлтийн хариултын утгыг бүлэг (хязгаар) тус бүрээр ангилж, тус бүрт хэдэн хариулт ноогдсоныг харуулав" + (c.sub ? " (" + c.sub + ")" : "") + "."));
              kids.push(tbl([hrow(["Хязгаар", "Тоо"])].concat(c.hbars.map(drow))));
            } else if (c.donut.length) {
              kids.push(para("Доорх хүснэгтэд уг асуултын хариултыг ангилал тус бүрээр, хэдэн хариулт өгсөнтэй нь хамт харуулав."));
              kids.push(tbl([hrow(["Ангилал", "Тоо"])].concat(c.donut.map(drow))));
            } else if (c.ind) {
              kids.push(para("Үзүүлэлт: " + c.ind + (c.sub ? " (" + c.sub + ")" : "")));
            }
            kids.push(gap());
          });

          var doc = new d.Document({ sections: [{ children: kids }] });
          var blob = await d.Packer.toBlob(doc);
          var dt = new Date();
          var ymd = dt.getFullYear() + String(dt.getMonth() + 1).padStart(2, "0") + String(dt.getDate()).padStart(2, "0");
          saveAs(blob, "Khorshoo_tailan_" + ymd + ".docx");
        } catch (e) { alert("Алдаа: " + (e.message || e)); }
        finally { b.disabled = false; }
      });
    })();
  </script>

  <script>
    // Нэвтрэх (client-side гэнэн хамгаалалт)
    (function () {
      var USER = "admin_khorshoo", PASS = "khorshoo_2026";
      var ov = document.getElementById("login-overlay");
      var form = document.getElementById("login-form");
      if (!ov || !form) return;
      if (sessionStorage.getItem("khorshoo_auth") === "1") ov.classList.add("hidden");

        e.preventDefault();
        var u = (document.getElementById("login-user").value || "").trim();

        if (u === USER && p === PASS) {
          sessionStorage.setItem("khorshoo_auth", "1");
          ov.classList.add("hidden");
          document.getElementById("login-err").textContent = "";
        } else {
          document.getElementById("login-err").textContent = "Нэр эсвэл нууц үг буруу байна.";
        }
      });
    })();
  </script>
